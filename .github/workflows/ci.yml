name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Stylua formatting check
        uses: JohnnyMorganz/stylua-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          version: latest
          args: --check lua/ tests/

      - name: Install luacheck
        run: |
          sudo apt-get update -qq
          sudo apt-get install -yqq luarocks
          sudo luarocks install luacheck

      - name: Run luacheck
        run: luacheck lua/ --config .luacheckrc

  test:
    name: Test (Neovim ${{ matrix.neovim }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        neovim: [stable, nightly]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Neovim
        uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: ${{ matrix.neovim }}

      - name: Install plenary.nvim
        run: |
          mkdir -p ~/.local/share/nvim/site/pack/ci/start
          git clone --depth 1 https://github.com/nvim-lua/plenary.nvim ~/.local/share/nvim/site/pack/ci/start/plenary.nvim

      - name: Run smoke test (headless load)
        run: |
          nvim --headless --clean -u tests/minimal_init.lua \
            -c "lua require('grok-code').setup()" \
            -c "lua print('✓ Plugin loaded successfully')" \
            -c "qall"

      - name: Run basic E2E tests with plenary
        run: |
          nvim --headless --clean -u tests/minimal_init.lua \
            -c "lua require('plenary.test_harness').test_directory('tests', {minimal_init = 'tests/minimal_init.lua'})" \
            -c "qall"

  actionlint:
    name: Lint GitHub Actions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: reviewdog/action-actionlint@v1
        with:
          fail_level: error
